<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cover Letter Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ AI Cover Letter Generator</h1>
            <p>Fill in your details and let our AI draft your perfect letter.</p>
        </header>

        <form id="letterForm">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" placeholder="e.g. Jane Doe" required>
            </div>

            <div class="form-group">
                <label for="role">Job Role</label>
                <input type="text" id="role" placeholder="e.g. Senior Product Manager" required>
            </div>

            <div class="form-group">
                <label for="company">Company Name</label>
                <input type="text" id="company" placeholder="e.g. TechCorp Inc." required>
            </div>

            <div class="form-group">
                <label for="skills">Key Skills (comma separated)</label>
                <textarea id="skills" rows="3" placeholder="e.g. Project Management, Python, Agile" required></textarea>
            </div>

            <button type="submit" id="generateBtn">Generate Cover Letter</button>
        </form>

        <div id="resultArea" class="hidden">
            <h3>Your Cover Letter:</h3>
            <div class="copy-box">
                <pre id="letterOutput"></pre>
                <button id="copyBtn">Copy to Clipboard</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
