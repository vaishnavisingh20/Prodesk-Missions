<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Budget Tracker</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2, h3 { margin-top: 0; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }
        button:hover { background-color: #4338ca; }

        /* Dashboard Styles */
        .balance-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .balance-amount {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--text);
        }
        .balance-amount.alert {
            color: var(--danger);
            animation: pulse 1s infinite;
        }

        .expense-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }
        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .delete-btn {
            background: none;
            color: var(--danger);
            width: auto;
            padding: 5px;
            font-size: 1.2rem;
        }
        .delete-btn:hover { background: #fee2e2; }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .controls button { width: auto; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
       
        <div class="card">
            <h2><i class="fas fa-pen-to-square"></i> Add Data</h2>
            
            
            <div class="form-group">
                <label>Currency</label>
                <select id="currencySelect">
                    <option value="USD">USD ($)</option>
                    <option value="EUR">EUR (€)</option>
                    <option value="INR">INR (₹)</option>
                    <option value="GBP">GBP (£)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Total Salary</label>
                <input type="number" id="salaryInput" placeholder="Enter Salary">
            </div>

            <div class="form-group">
                <label>Expense Name</label>
                <input type="text" id="expenseName" placeholder="e.g. Groceries">
            </div>

            <div class="form-group">
                <label>Expense Amount</label>
                <input type="number" id="expenseAmount" placeholder="Enter Amount">
            </div>

            <button id="addBtn">Add Expense</button>
            <button id="setSalaryBtn" style="background-color: #6b7280; margin-top: 10px;">Set Salary</button>
        </div>

       
        <div class="card">
            <div class="controls">
                <button id="exportBtn"><i class="fas fa-file-pdf"></i> Download Report</button>
            </div>

            <div class="balance-container">
                <h3>Remaining Balance</h3>
                <div id="balanceDisplay" class="balance-amount">$0.00</div>
                <small id="alertMsg" style="color: var(--danger); display: none;">⚠️ Warning: Low Balance!</small>
            </div>

            <canvas id="budgetChart" style="max-height: 250px;"></canvas>

            <h3>Expense History</h3>
            <ul id="expenseList" class="expense-list">
                
            </ul>
        </div>
    </div>

    <script>
       
        let appData = {
            salary: 0,
            expenses: [],
            currency: 'USD'
        };

    
        const salaryInput = document.getElementById('salaryInput');
        const expenseNameInput = document.getElementById('expenseName');
        const expenseAmountInput = document.getElementById('expenseAmount');
        const currencySelect = document.getElementById('currencySelect');
        const addBtn = document.getElementById('addBtn');
        const setSalaryBtn = document.getElementById('setSalaryBtn');
        const expenseListEl = document.getElementById('expenseList');
        const balanceDisplay = document.getElementById('balanceDisplay');
        const alertMsg = document.getElementById('alertMsg');
        const exportBtn = document.getElementById('exportBtn');

        function loadData() {
            const savedData = localStorage.getItem('budgetAppData');
            if (savedData) {
                appData = JSON.parse(savedData);
                
                salaryInput.value = appData.salary;
                expenseNameInput.value = '';
                expenseAmountInput.value = '';
                currencySelect.value = appData.currency;
                renderAll();
            }
        }

        function saveData() {
            localStorage.setItem('budgetAppData', JSON.stringify(appData));
            renderAll();
        }

        
        function calculateBalance() {
            const totalExpenses = appData.expenses.reduce((sum, item) => sum + item.amount, 0);
            return appData.salary - totalExpenses;
        }

        function validateInput() {
            const name = expenseNameInput.value.trim();
            const amount = parseFloat(expenseAmountInput.value);

            if (!name) {
                alert("Expense name cannot be empty.");
                return false;
            }
            if (isNaN(amount) || amount <= 0) {
                alert("Expense amount must be a positive number.");
                return false;
            }
            return true;
        }

        function addExpense() {
            if (!validateInput()) return;

            const newExpense = {
                id: Date.now(),
                name: expenseNameInput.value,
                amount: parseFloat(expenseAmountInput.value)
            };

            appData.expenses.push(newExpense);
            saveData();
            
           
            expenseNameInput.value = '';
            expenseAmountInput.value = '';
        }

        function setSalary() {
            const salary = parseFloat(salaryInput.value);
            if (isNaN(salary) || salary < 0) {
                alert("Please enter a valid salary.");
                return;
            }
            appData.salary = salary;
            saveData();
        }

        function deleteExpense(id) {
            appData.expenses = appData.expenses.filter(item => item.id !== id);
            saveData();
        }

        
        let budgetChart;

        function initChart() {
            const ctx = document.getElementById('budgetChart').getContext('2d');
            budgetChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Remaining Balance', 'Total Expenses'],
                    datasets: [{
                        data: [0, 0],
                        backgroundColor: ['#10b981', '#ef4444'],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        function updateChart() {
            const balance = calculateBalance();
            const totalExpenses = appData.expenses.reduce((sum, item) => sum + item.amount, 0);
            
            
            
            budgetChart.data.datasets[0].data = [balance, totalExpenses];
            budgetChart.update();
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(18);
            doc.text("Budget Report", 20, 20);

            doc.setFontSize(12);
            doc.text(`Date: ${new Date().toLocaleDateString()}`, 20, 30);
            doc.text(`Currency: ${appData.currency}`, 20, 40);
            
            doc.text(`Total Salary: ${formatCurrency(appData.salary)}`, 20, 50);
            doc.text(`Total Expenses: ${formatCurrency(appData.expenses.reduce((a,b)=>a+b.amount,0))}`, 20, 60);
            doc.text(`Remaining Balance: ${formatCurrency(calculateBalance())}`, 20, 70);

            doc.setLineWidth(0.5);
            doc.line(20, 75, 190, 75);

            let y = 85;
            doc.setFontSize(10);
            doc.text("Expense List:", 20, y);
            y += 10;

            appData.expenses.forEach(exp => {
                if (y > 270) { doc.addPage(); y = 20; } // Simple pagination
                doc.text(`- ${exp.name}: ${formatCurrency(exp.amount)}`, 25, y);
                y += 7;
            });

            doc.save("budget-report.pdf");
        }

       
        let exchangeRates = {};

        async function fetchRates() {
            try {
                
                const response = await fetch(`https://api.frankfurter.app/latest?from=USD`);
                const data = await response.json();
                exchangeRates = data.rates;
                renderAll(); 
            } catch (error) {
                console.error("Error fetching rates:", error);
                alert("Could not fetch exchange rates. Check internet connection.");
            }
        }

        function formatCurrency(amount) {
            const symbol = currencySelect.value;
            return `${symbol} ${amount.toFixed(2)}`;
        }

        function renderAll() {
            expenseListEl.innerHTML = '';
            appData.expenses.forEach(exp => {
                const li = document.createElement('li');
                li.className = 'expense-item';
                li.innerHTML = `
                    <span>${exp.name}</span>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span>${formatCurrency(exp.amount)}</span>
                        <button class="delete-btn" onclick="deleteExpense(${exp.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
                expenseListEl.appendChild(li);
            });

            const balance = calculateBalance();
            balanceDisplay.textContent = formatCurrency(balance);

            if (appData.salary > 0) {
                const threshold = appData.salary * 0.10; 
                if (balance < threshold) {
                    balanceDisplay.classList.add('alert');
                    alertMsg.style.display = 'block';
                } else {
                    balanceDisplay.classList.remove('alert');
                    alertMsg.style.display = 'none';
                }
            }

            updateChart();
        }

        
        addBtn.addEventListener('click', addExpense);
        setSalaryBtn.addEventListener('click', setSalary);
        exportBtn.addEventListener('click', exportPDF);
        
       
        currencySelect.addEventListener("change", () => {
            appData.currency = currencySelect.value;
            saveData();
        });

       
        window.addEventListener("DOMContentLoaded", () => {
            initChart();
            loadData();
            fetchRates();
        });
        </script>
        </body>
        </html>
